services:
  - type: web
    name: buildlab-whatsapp-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: GRAPH_API_VERSION
        value: v25.0
      - key: VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: ADMIN_KEY
        sync: false
